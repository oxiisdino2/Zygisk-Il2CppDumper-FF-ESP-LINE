name: Build Hook Module

on:
  push:
    branches: [ main ]
    paths:
      - 'FF_ESP_Panel/android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: true

      - name: Map architecture
        id: arch_map
        shell: bash
        run: |
          case "${{ matrix.arch }}" in
            arm64-v8a)  TOOLCHAIN=aarch64-linux-android21  ;;
            armeabi-v7a) TOOLCHAIN=armv7a-linux-androideabi21  ;;
            x86)        TOOLCHAIN=i686-linux-android21  ;;
            x86_64)     TOOLCHAIN=x86_64-linux-android21  ;;
          esac
          echo "toolchain=$TOOLCHAIN" >> $GITHUB_OUTPUT

      - name: Compile hook.cpp
        shell: bash
        run: |
          TOOL=${{ steps.arch_map.outputs.toolchain }}
          ${TOOL}-clang++ \
            -std=c++17 \
            -fvisibility=hidden \
            -fPIC \
            -shared \
            -static-libstdc++ \
            -o libffhook_${{ matrix.arch }}.so \
            -I FF_ESP_Panel/src \
            FF_ESP_Panel/android/hook.cpp \
            -llog

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libffhook_${{ matrix.arch }}
          path: libffhook_${{ matrix.arch }}.so

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Zygisk module
        shell: bash
        run: |
          mkdir -p module/META-INF/com/google/android
          mkdir -p module/zygisk

          # Copy module files
          cp extracted/module.prop module/
          cp extracted/META-INF/com/google/android/update-binary module/META-INF/com/google/android/
          cp extracted/META-INF/com/google/android/updater-script module/META-INF/com/google/android/

          # Copy compiled .so files
          cp artifacts/libffhook_arm64-v8a/libffhook_arm64-v8a.so module/zygisk/arm64-v8a.so
          cp artifacts/libffhook_armeabi-v7a/libffhook_armeabi-v7a.so module/zygisk/armeabi-v7a.so
          cp artifacts/libffhook_x86/libffhook_x86.so module/zygisk/x86.so
          cp artifacts/libffhook_x86_64/libffhook_x86_64.so module/zygisk/x86_64.so

          # Update module.prop
          sed -i 's/id=zygisk_il2cppdumper/id=zygisk_ff_esp/' module/module.prop
          sed -i 's/name=Il2CppDumper/name=FF ESP Hook/' module/module.prop
          sed -i 's/version=v1.2.0/version=v1.0.0/' module/module.prop
          sed -i 's/author=Perfare/author=FF_ESP/' module/module.prop
          sed -i 's/description=.*/description=Free Fire ESP hook module for Bluestacks\/MSI Emulator/' module/module.prop

          # Create zip
          cd module
          zip -r ../FF_ESP_Hook_Module.zip *
          cd ..

      - name: Upload final module
        uses: actions/upload-artifact@v4
        with:
          name: FF_ESP_Hook_Module
          path: FF_ESP_Hook_Module.zip
