name: Build Hook Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64-v8a
            target: aarch64-linux-android21
          - arch: armeabi-v7a
            target: armv7a-linux-androideabi21
          - arch: x86
            target: i686-linux-android21
          - arch: x86_64
            target: x86_64-linux-android21
    steps:
      - uses: actions/checkout@v4

      - name: Get NDK
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip curl
          cd /tmp
          curl -sLo ndk.zip https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q ndk.zip
          echo "NDK_HOME=/tmp/android-ndk-r27" >> $GITHUB_ENV

      - name: Compile hook.cpp
        shell: bash
        run: |
          set -x
          TOOLCHAIN=${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          CC=$TOOLCHAIN/${{ matrix.target }}-clang++
          
          echo "=== Compiler ==="
          ls -la $TOOLCHAIN/ | grep ${{ matrix.target }}
          $CC --version
          
          echo "=== Compiling ==="
          $CC \
            -std=c++17 \
            -fvisibility=hidden \
            -fPIC \
            -shared \
            -static-libstdc++ \
            -o libffhook_${{ matrix.arch }}.so \
            FF_ESP_Panel/android/hook.cpp \
            -llog \
            2>&1 | tee compile_output.txt
          
          echo "=== Exit code: $? ==="
          ls -lh libffhook_${{ matrix.arch }}.so || true

      - name: Upload compile log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compile_log_${{ matrix.arch }}
          path: compile_output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libffhook_${{ matrix.arch }}
          path: libffhook_${{ matrix.arch }}.so

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package module
        shell: bash
        run: |
          ls -la artifacts/
          mkdir -p module/META-INF/com/google/android module/zygisk

          cp extracted/module.prop module/
          cp extracted/META-INF/com/google/android/update-binary module/META-INF/com/google/android/
          cp extracted/META-INF/com/google/android/updater-script module/META-INF/com/google/android/

          cp artifacts/libffhook_arm64-v8a/libffhook_arm64-v8a.so module/zygisk/arm64-v8a.so
          cp artifacts/libffhook_armeabi-v7a/libffhook_armeabi-v7a.so module/zygisk/armeabi-v7a.so
          cp artifacts/libffhook_x86/libffhook_x86.so module/zygisk/x86.so
          cp artifacts/libffhook_x86_64/libffhook_x86_64.so module/zygisk/x86_64.so

          sed -i 's/id=zygisk_il2cppdumper/id=zygisk_ff_esp/' module/module.prop
          sed -i 's/name=Il2CppDumper/name=FF ESP Hook/' module/module.prop
          sed -i 's/version=v1.2.0/version=v1.0.0/' module/module.prop
          sed -i 's/author=Perfare/author=FF_ESP/' module/module.prop
          sed -i 's/description=.*/description=FF ESP module/' module/module.prop

          cd module && zip -r ../FF_ESP_Hook_Module.zip * && cd ..

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: FF_ESP_Hook_Module
          path: module/
